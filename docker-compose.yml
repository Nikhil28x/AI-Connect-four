services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gamedb}
      POSTGRES_USER: ${POSTGRES_USER:-gameuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gamepass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${POSTGRES_USER:-gameuser} -d ${POSTGRES_DB:-gamedb} -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis

  flower:
    build:
      context: ./backend
    command: celery -A app.celery_app --broker=${REDIS_URL:-redis://redis:6379/0} flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
